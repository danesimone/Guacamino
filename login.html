<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Accesso - Diario di Guacamino</title>
</head>
<body>

<h2>Accesso Riservato 🥑</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="register()">Registrati</button>
<button onclick="login()">Login</button>

<p id="message"></p>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyACTHbo7Pr5sLpfnCqbRvTgHGQgqnuGmYQ",
  authDomain: "guacamino-d2248.firebaseapp.com",
  projectId: "guacamino-d2248",
  storageBucket: "guacamino-d2248.firebasestorage.app",
  messagingSenderId: "681697539172",
  appId: "1:681697539172:web:ae49eacdabc9ea862c5b71"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch(error => {
      document.getElementById("message").innerText = error.message;
    });
}

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch(error => {
      document.getElementById("message").innerText = error.message;
    });
}

</script>

</body>
</html>
